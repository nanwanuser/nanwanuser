name: Generate Profile Assets

on:
  # 每天午夜自动运行一次
  schedule:
    - cron: "0 0 * * *"
  # 允许手动触发执行
  workflow_dispatch:
  # 当主分支有代码推送时执行
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: 
      contents: write # 允许机器人推送生成的 SVG 到你的仓库

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate GitHub stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=nanwanuser&show_icons=true&hide_border=true&bg_color=0d1117&title_color=7dd3fc&text_color=c9d1d9&icon_color=4ade80&rank_icon=github
          path: dist/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=nanwanuser&layout=compact&langs_count=8&card_width=320&hide_border=true&bg_color=0d1117&title_color=7dd3fc&text_color=c9d1d9
          path: dist/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: nanwanuser
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick librsvg2-bin

      - name: Compose telemetry cards
        run: |
          rsvg-convert -w 495 -h 200 dist/github-stats.svg -o dist/github-stats.png
          rsvg-convert -w 320 -h 200 dist/top-langs.svg -o dist/top-langs.png
          magick dist/github-stats.png dist/top-langs.png +append dist/telemetry-cards.png

      - name: Push generated SVG assets to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
